apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: release-service-egress-controller-manager
  namespace: release-service
spec:
  egress:
  # Allow gRPC export to OTel collector for distributed tracing
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: konflux-otel
    ports:
    - port: 4317
      protocol: TCP
