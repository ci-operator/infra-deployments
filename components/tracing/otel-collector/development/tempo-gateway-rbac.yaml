apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempo-traces-write-trace-demo
rules:
  - apiGroups:
      - tempo.grafana.com
    resources:
      - trace-demo
    resourceNames:
      - traces
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tempo-traces-write-trace-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tempo-traces-write-trace-demo
subjects:
  - kind: ServiceAccount
    name: open-telemetry-opentelemetry-collector
    namespace: konflux-otel
