---
apiVersion: v1
kind: Namespace
metadata:
  name: konflux-info
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-config
  namespace: konflux-info
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: konflux-public-info-view-role
  namespace: konflux-info
rules:
  - verbs:
      - get
      - list
    apiGroups:
      - ''
    resourceNames:
      - cluster-config
    resources:
      - configmaps
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: konflux-public-info-view-rb
  namespace: konflux-info
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: 'system:authenticated'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: konflux-public-info-view-role
