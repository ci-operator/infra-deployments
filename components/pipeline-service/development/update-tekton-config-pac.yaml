---
# Development-only PaC overrides:
# - OTEL exporter endpoint for distributed tracing
# NOTE: Image overrides don't work via TektonConfig options.deployments;
# the operator applies env vars but ignores the image field. Images are
# patched directly on the Deployments after operator reconciliation.
- op: add
  path: /spec/platforms/openshift/pipelinesAsCode/options/deployments/pipelines-as-code-controller
  value:
    spec:
      template:
        spec:
          containers:
            - name: pac-controller
              env:
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: open-telemetry-opentelemetry-collector.konflux-otel.svc.cluster.local:4317
- op: add
  path: /spec/platforms/openshift/pipelinesAsCode/options/deployments/pipelines-as-code-watcher
  value:
    spec:
      template:
        spec:
          containers:
            - name: pac-watcher
              env:
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: open-telemetry-opentelemetry-collector.konflux-otel.svc.cluster.local:4317
- op: add
  path: /spec/platforms/openshift/pipelinesAsCode/options/deployments/pipelines-as-code-webhook
  value:
    spec:
      template:
        spec:
          containers:
            - name: pac-webhook
              env:
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: open-telemetry-opentelemetry-collector.konflux-otel.svc.cluster.local:4317
