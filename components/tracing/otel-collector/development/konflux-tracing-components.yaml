---
apiVersion: v1
kind: Namespace
metadata:
  name: trace-demo
  labels:
    argocd.argoproj.io/managed-by: openshift-gitops
    toolchain.dev.openshift.com/provider: codeready-toolchain
---
apiVersion: appstudio.redhat.com/v1alpha1
kind: Application
metadata:
  name: konflux-tracing
  namespace: trace-demo
spec:
  displayName: Konflux Tracing
  description: >-
    Dogfooding tenant for distributed tracing instrumentation.
    Components are the Konflux services being instrumented per ADR-0061:
    PaC, integration-service, release-service.
---
apiVersion: appstudio.redhat.com/v1alpha1
kind: ImageRepository
metadata:
  name: pipelines-as-code-controller
  namespace: trace-demo
  labels:
    appstudio.redhat.com/component: pipelines-as-code-controller
    appstudio.redhat.com/application: konflux-tracing
spec:
  image:
    visibility: private
---
apiVersion: appstudio.redhat.com/v1alpha1
kind: ImageRepository
metadata:
  name: pipelines-as-code-watcher
  namespace: trace-demo
  labels:
    appstudio.redhat.com/component: pipelines-as-code-watcher
    appstudio.redhat.com/application: konflux-tracing
spec:
  image:
    visibility: private
---
apiVersion: appstudio.redhat.com/v1alpha1
kind: ImageRepository
metadata:
  name: pipelines-as-code-webhook
  namespace: trace-demo
  labels:
    appstudio.redhat.com/component: pipelines-as-code-webhook
    appstudio.redhat.com/application: konflux-tracing
spec:
  image:
    visibility: private
---
apiVersion: appstudio.redhat.com/v1alpha1
kind: Component
metadata:
  name: pipelines-as-code-controller
  namespace: trace-demo
spec:
  application: konflux-tracing
  componentName: pipelines-as-code-controller
  containerImage: quay.io/rekonflux/trace-demo/pipelines-as-code-controller
  source:
    git:
      url: https://github.com/ci-operator/pipelines-as-code
      revision: distributed-tracing-dev
      dockerfileUrl: Containerfile
---
apiVersion: appstudio.redhat.com/v1alpha1
kind: Component
metadata:
  name: pipelines-as-code-watcher
  namespace: trace-demo
spec:
  application: konflux-tracing
  componentName: pipelines-as-code-watcher
  containerImage: quay.io/rekonflux/trace-demo/pipelines-as-code-watcher
  source:
    git:
      url: https://github.com/ci-operator/pipelines-as-code
      revision: distributed-tracing-dev
      dockerfileUrl: Containerfile
---
apiVersion: appstudio.redhat.com/v1alpha1
kind: Component
metadata:
  name: pipelines-as-code-webhook
  namespace: trace-demo
spec:
  application: konflux-tracing
  componentName: pipelines-as-code-webhook
  containerImage: quay.io/rekonflux/trace-demo/pipelines-as-code-webhook
  source:
    git:
      url: https://github.com/ci-operator/pipelines-as-code
      revision: distributed-tracing-dev
      dockerfileUrl: Containerfile
---
apiVersion: appstudio.redhat.com/v1alpha1
kind: ImageRepository
metadata:
  name: integration-service
  namespace: trace-demo
  labels:
    appstudio.redhat.com/component: integration-service
    appstudio.redhat.com/application: konflux-tracing
spec:
  image:
    visibility: private
---
apiVersion: appstudio.redhat.com/v1alpha1
kind: Component
metadata:
  name: integration-service
  namespace: trace-demo
spec:
  application: konflux-tracing
  componentName: integration-service
  containerImage: quay.io/rekonflux/trace-demo/integration-service
  source:
    git:
      url: https://github.com/ci-operator/integration-service
      revision: distributed-tracing-dev
      dockerfileUrl: Dockerfile
