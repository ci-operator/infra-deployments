apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-service-controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        resources:
          limits:
            memory: 256Mi
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://open-telemetry-opentelemetry-collector.konflux-otel.svc.cluster.local:4317"
